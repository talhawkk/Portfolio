{% comment %}
  BreadcrumbList — pass `breadcrumb_items` as a list of dicts:
    [{"name": "Home", "url": "/"}, {"name": "Projects", "url": "/projects/"}, ...]
  Renders in project_detail and blog_detail templates.
{% endcomment %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {% for item in breadcrumb_items %}
    {
      "@type": "ListItem",
      "position": {{ forloop.counter }},
      "name": "{{ item.name|escapejs }}",
      "item": "{{ SITE_URL }}{{ item.url }}"
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
